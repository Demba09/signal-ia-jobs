<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Merci — Signal jobs Data & IA</title>
    <meta name="description" content="Merci pour votre inscription à la waitlist Signal jobs Data & IA." />
    <meta name="robots" content="noindex,nofollow" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <script defer data-domain="demba09.github.io" src="https://plausible.io/js/script.js"></script>
    <style>
      :root { --bg:#f5f5f2; --text:#101828; --muted:#667085; --accent:#4454ff; }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: Inter, system-ui, sans-serif;
        color: var(--text);
        background: linear-gradient(180deg, #fafaf8 0%, #f3f3f0 100%);
      }
      .card {
        width: min(92vw, 760px);
        padding: 32px;
        border-radius: 28px;
        background: rgba(255,255,255,0.86);
        border: 1px solid rgba(15, 23, 42, 0.08);
        box-shadow: 0 24px 60px rgba(16,24,40,0.1);
      }
      h1 { margin: 0 0 10px; font-size: clamp(2rem, 4vw, 3.5rem); letter-spacing: -0.05em; }
      p { color: var(--muted); line-height: 1.7; font-size: 1.05rem; }
      a {
        display: inline-block;
        margin-top: 14px;
        color: white;
        text-decoration: none;
        background: linear-gradient(135deg, #111827 0%, #4454ff 90%);
        padding: 14px 18px;
        border-radius: 16px;
        font-weight: 700;
      }
      .small { font-size: .92rem; margin-top: 18px; }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Merci, tu es bien sur la waitlist.</h1>
      <p>
        Tu seras prévenu du lancement et des premières sélections Signal pour les jobs Data & IA en France.
      </p>
      <a href="index.html">Retour à la landing page</a>
      <p class="small">Pas de bruit. Juste une shortlist claire et ciblée.</p>
    </main>
    <script>
      window.addEventListener('DOMContentLoaded', function () {
        if (typeof window.plausible === 'function') window.plausible('Waitlist Conversion');
      });
    </script>
  </body>
</html>
